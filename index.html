<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Natalia!</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Arial', sans-serif;
      background-color: #ffe6f0;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #d1006c;
    }

    /* Start button */
    #startButton {
      padding: 30px 60px;
      font-size: 36px;
      background-color: #d1006c;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #startButton:hover {
      transform: scale(1.1);
    }

    /* Slideshow container */
    #slideshow {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: black;
      z-index: 1;
    }

    #slideshow img {
      position: absolute;
      top: 50%;
      left: 50%;
      max-width: 100%;
      max-height: 100%;
      transform: translate(-50%, -50%);
      display: none;
      object-fit: contain;
    }

    #slideshow img.active {
      display: block;
      animation: fade 1s;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* Optional: birthday message at the end */
    #message {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      color: #ffffff;
      text-align: center;
      line-height: 1.5;
      padding: 20px;
      background-color: rgba(209,0,108,0.5);
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <!-- Start button -->
  <button id="startButton">Press Me!</button>

  <!-- Slideshow -->
  <div id="slideshow">
    <img src="pic1.jpg" class="active">
    <img src="pic2.jpg">
    <img src="pic3.jpg">
    <img src="pic4.jpg">
    <img src="pic5.jpg">
    <img src="pic6.jpg">
  </div>

  <!-- Birthday message (optional at the end of slideshow) -->
  <div id="message">
    HAPPY BIRTHDAY to the coolest n prettiest girl in the world! 🩷
  </div>

  <!-- Background music -->
  <audio id="music" loop>
    <source src="distance.mp3" type="audio/mpeg">
  </audio>

  <script>
    const startButton = document.getElementById("startButton");
    const slideshow = document.getElementById("slideshow");
    const slides = document.querySelectorAll("#slideshow img");
    const music = document.getElementById("music");
    const message = document.getElementById("message");
    const slideDuration = 5000; // 5 seconds per slide
    let current = 0;

    startButton.addEventListener("click", () => {
      // Hide button
      startButton.style.display = "none";

      // Show slideshow
      slideshow.style.display = "block";

      // Start music
      music.play().catch(() => {
        console.log("Autoplay blocked, will start on first click");
        document.body.addEventListener("click", () => {
          music.play();
        }, { once: true });
      });

      // Hide all slides except first
      slides.forEach((slide, i) => { if(i !== 0) slide.style.display = "none"; });

      // Start slideshow
      const slideshowInterval = setInterval(() => {
        slides[current].classList.remove("active");
        slides[current].style.display = "none";
        current++;
        if (current >= slides.length) {
          clearInterval(slideshowInterval);
          // Optionally show message at the end
          message.style.display = "block";
          return;
        }
        slides[current].style.display = "block";
        slides[current].classList.add("active");
      }, slideDuration);
    });
  </script>

</body>
</html>
